<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Analysis</title>
</head>

<body>
    <div class="container">
        <h1>Sentiment Analysis</h1>
        <form method="POST">
            <textarea name="user_text" placeholder="Enter your text here..."></textarea>
            <button type="submit">Analyze</button>
        </form>
        {% if sentiment %}
            <p>Positive: {{ sentiment['pos'] * 100 }} % </p>
            <p>Neutral: {{ sentiment['neu'] * 100 }} % </p>
            <p>Negative: {{ sentiment['neg'] * 100 }} % </p>
            <p>Compound: {{ sentiment['compound'] * 100 }} % </p>
            <p>Custom: {{ sentiment['custom model positive'] * 100 }} % </p>
        {% endif %}    
    </div>
</body>
</html>
